    <line x1="256" y1="130" x2="256" y2="276" stroke="#a8d5a2" stroke-width="20" stroke-linecap="round"/>

<style>
:root{
  --bg:#1a1a1a; --s1:#232323; --s2:#2a2a2a; --bd:#333;
  --grn:#a8d5a2; --grn-d:#a8d5a218; --grn-m:#a8d5a240; --grn-g:#a8d5a255;
  --tx:#e8e8e8; --t2:#999; --t3:#555;
  --red:#e07070;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body,html{width:100%;height:100%;background:var(--bg);color:var(--tx);overflow:hidden;position:fixed;top:0;left:0;font-family:'Barlow',sans-serif;}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:999;transition:opacity 0.7s ease;}
#splash.hide{opacity:0;pointer-events:none;}
#splash svg{width:88px;height:88px;animation:fi 0.9s ease forwards;opacity:0;}
#splash .sn{font-family:'Lilita One',cursive;font-size:1.6rem;letter-spacing:4px;color:var(--grn);animation:fi 0.9s 0.2s ease forwards;opacity:0;}
@keyframes fi{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* LAYOUT */
.app{display:flex;flex-direction:column;width:100vw;height:100%;padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);}

/* HEADER */
.hdr{padding:16px 18px 13px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--bd);}
.hdr-left{display:flex;align-items:center;gap:9px;}
.hdr-left svg{width:28px;height:28px;}
.hdr-name{font-family:'Lilita One',cursive;font-size:1.15rem;letter-spacing:1px;color:var(--grn);}
.hdr-date{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;letter-spacing:2px;color:var(--t3);text-transform:uppercase;}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px 24px;display:flex;flex-direction:column;gap:13px;}

/* CARDS */
.card{background:var(--s1);border-radius:20px;padding:18px;border:1px solid var(--bd);display:flex;flex-direction:column;gap:13px;}
.sec{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--t3);}

/* CONFIG */
.dur-row{display:flex;align-items:center;gap:10px;}
.dur-input{
  flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:12px;
  color:var(--tx);font-family:'Lilita One',cursive;font-size:2.2rem;
  padding:10px 14px;outline:none;text-align:center;
  -webkit-appearance:none;appearance:none;transition:border-color 0.2s;
}
.dur-input:focus{border-color:var(--grn);}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;}
.dur-unit{font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;color:var(--t3);white-space:nowrap;letter-spacing:1px;}

.presets{display:flex;gap:7px;flex-wrap:wrap;}
.pre-btn{
  background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:6px 13px;
  font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;font-weight:700;letter-spacing:1px;
  color:var(--t2);cursor:pointer;transition:all 0.15s;
}
.pre-btn.active{background:var(--grn-d);border-color:var(--grn);color:var(--grn);}

.btn-start{
  width:100%;padding:16px;background:var(--grn);color:#111;border:none;border-radius:14px;
  font-family:'Lilita One',cursive;font-size:1.1rem;letter-spacing:1px;cursor:pointer;transition:opacity 0.15s;
}
.btn-start:active{opacity:0.8;}

/* CÍRCULO — FIX: tamanho responsivo via vw */
.circle-card{
  background:var(--s1);border-radius:20px;padding:22px 16px 18px;
  border:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;gap:16px;
}

/* O wrap usa vw para garantir que cabe na tela */
.circle-wrap{
  position:relative;
  width:min(72vw, 280px);
  height:min(72vw, 280px);
}
.circle-svg{
  width:100%;height:100%;
  transform:rotate(-90deg);
  overflow:visible;
}
.circle-track{fill:none;stroke:var(--s2);stroke-width:10;}
.circle-prog{
  fill:none;stroke:var(--grn);stroke-width:10;stroke-linecap:round;
  stroke-dasharray:628;stroke-dashoffset:628;
  transition:stroke-dashoffset 1s linear,stroke 0.5s ease;
  filter:drop-shadow(0 0 10px var(--grn-g));
}
.circle-prog.over{stroke:var(--red);filter:drop-shadow(0 0 8px #e0707066);}

/* Centro do círculo — fonte menor para caber dentro */
.circle-center{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  padding:0 10%;/* garante margem interna do traço */
}
.circle-time{
  font-family:'Lilita One',cursive;
  /* Fonte fluida: grande em telas grandes, menor em pequenas */
  font-size:clamp(1.6rem, 9vw, 2.4rem);
  color:var(--tx);line-height:1;white-space:nowrap;
}
.circle-sub{font-family:'Barlow Condensed',sans-serif;font-size:clamp(0.55rem,2.5vw,0.72rem);letter-spacing:3px;text-transform:uppercase;color:var(--t3);}
.circle-pct{font-family:'Lilita One',cursive;font-size:clamp(0.85rem,3.5vw,1rem);color:var(--grn);}

/* Stats abaixo do círculo */
.circle-stats{display:flex;gap:24px;justify-content:center;}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:3px;}
.stat-val{font-family:'Lilita One',cursive;font-size:1rem;color:var(--tx);}
.stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--t3);}

.btn-stop{
  width:100%;padding:14px;background:transparent;color:var(--red);
  border:1px solid #4a1515;border-radius:14px;
  font-family:'Lilita One',cursive;font-size:1rem;letter-spacing:1px;cursor:pointer;transition:background 0.15s;
}
.btn-stop:active{background:#1a0505;}

/* MURAL */
.mural-list{display:flex;flex-direction:column;}
.mural-item{display:flex;align-items:flex-start;gap:13px;padding:13px 0;border-bottom:1px solid var(--s2);}
.mural-item:last-child{border-bottom:none;padding-bottom:0;}
.mural-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:3px;}
.mural-dot{width:10px;height:10px;border-radius:50%;background:var(--bd);flex-shrink:0;transition:background 0.4s,box-shadow 0.4s;}
.mural-item.reached .mural-dot{background:var(--grn);box-shadow:0 0 8px var(--grn-g);}
.mural-item.active-now .mural-dot{background:var(--grn);box-shadow:0 0 14px var(--grn);animation:dp 1.5s ease-in-out infinite;}
@keyframes dp{0%,100%{box-shadow:0 0 6px var(--grn-g);}50%{box-shadow:0 0 20px var(--grn);}}
.mural-line{width:1px;flex:1;min-height:18px;background:var(--bd);margin-top:4px;}
.mural-item.reached .mural-line{background:var(--grn);opacity:0.25;}
.mural-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.mural-ts{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;letter-spacing:1px;color:var(--t3);}
.mural-item.reached .mural-ts{color:var(--grn);}
.mural-ev{font-family:'Lilita One',cursive;font-size:0.92rem;color:var(--t2);line-height:1.2;}
.mural-item.reached .mural-ev{color:var(--tx);}
.mural-item.active-now .mural-ev{color:var(--tx);}
.mural-desc{font-size:0.76rem;color:var(--t3);line-height:1.5;}
.mural-item.reached .mural-desc{color:var(--t2);}
.mural-item.active-now .mural-desc{color:var(--t2);}

/* Banner instalar */
#ib{display:none;background:#0c1f10;border:1px solid var(--grn);border-radius:13px;padding:9px 13px;align-items:center;gap:9px;font-size:0.78rem;color:var(--t2);}
#ib.show{display:flex;}
#ib span{flex:1;line-height:1.4;}
#ib strong{color:var(--grn);}
.ib-y{background:var(--grn);color:#000;font-family:'Lilita One',cursive;font-size:0.78rem;border:none;border-radius:7px;padding:7px 11px;cursor:pointer;white-space:nowrap;}
.ib-n{background:transparent;color:var(--t3);border:none;font-size:1rem;cursor:pointer;padding:3px;}

.hidden{display:none!important;}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="64" rx="38" ry="7" fill="none" stroke="#a8d5a2" stroke-width="4.5"/>
    <ellipse cx="50" cy="64" rx="24" ry="4" fill="none" stroke="#a8d5a2" stroke-width="2.5" opacity="0.4"/>
    <line x1="50" y1="22" x2="50" y2="57" stroke="#a8d5a2" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="36" y1="28" x2="36" y2="52" stroke="#a8d5a2" stroke-width="3" stroke-linecap="round"/>
    <line x1="64" y1="28" x2="64" y2="52" stroke="#a8d5a2" stroke-width="3" stroke-linecap="round"/>
  </svg>
  <div class="sn">JEJUM</div>
</div>

<div class="app" id="main-app">

  <div class="hdr">
    <div class="hdr-left">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="64" rx="38" ry="7" fill="none" stroke="#a8d5a2" stroke-width="4.5"/>
        <ellipse cx="50" cy="64" rx="24" ry="4" fill="none" stroke="#a8d5a2" stroke-width="2.5" opacity="0.4"/>
        <line x1="50" y1="22" x2="50" y2="57" stroke="#a8d5a2" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="36" y1="28" x2="36" y2="52" stroke="#a8d5a2" stroke-width="3" stroke-linecap="round"/>
        <line x1="64" y1="28" x2="64" y2="52" stroke="#a8d5a2" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span class="hdr-name">JEJUM</span>
    </div>
    <span class="hdr-date" id="hdr-date"></span>
  </div>

  <div class="scroll">

    <div id="ib"><span>📲 <strong>Instalar como app?</strong></span><button class="ib-y" id="ib-y">Instalar</button><button class="ib-n" id="ib-n">✕</button></div>

    <!-- CONFIG -->
    <div class="card" id="cfg">
      <div class="sec">Duração do jejum</div>
      <div class="dur-row">
        <input type="number" class="dur-input" id="dur-input" value="16" min="1" max="168" inputmode="numeric">
        <span class="dur-unit">HORAS</span>
      </div>
      <div>
        <div class="sec" style="margin-bottom:10px">Protocolos comuns</div>
        <div class="presets">
          <button class="pre-btn" data-h="12">12h</button>
          <button class="pre-btn active" data-h="16">16h</button>
          <button class="pre-btn" data-h="18">18h</button>
          <button class="pre-btn" data-h="20">20h</button>
          <button class="pre-btn" data-h="24">24h</button>
          <button class="pre-btn" data-h="36">36h</button>
          <button class="pre-btn" data-h="48">48h</button>
          <button class="pre-btn" data-h="72">72h</button>
        </div>
      </div>
      <button class="btn-start" id="btn-start">Iniciar Jejum</button>
    </div>

    <!-- CÍRCULO -->
    <div class="circle-card hidden" id="circle-sec">
      <div class="circle-wrap">
        <svg class="circle-svg" viewBox="0 0 220 220">
          <circle class="circle-track" cx="110" cy="110" r="100"/>
          <circle class="circle-prog" id="ring" cx="110" cy="110" r="100"/>
        </svg>
        <div class="circle-center">
          <div class="circle-time" id="c-time">00:00:00</div>
          <div class="circle-sub">EM JEJUM</div>
          <div class="circle-pct" id="c-pct">0%</div>
        </div>
      </div>
      <div class="circle-stats">
        <div class="stat-item"><div class="stat-val" id="s-meta">16h</div><div class="stat-lbl">Meta</div></div>
        <div class="stat-item"><div class="stat-val" id="s-rest">16:00</div><div class="stat-lbl">Restante</div></div>
        <div class="stat-item"><div class="stat-val" id="s-term">--:--</div><div class="stat-lbl">Término</div></div>

      <button class="btn-stop" id="btn-stop">Encerrar Jejum</button>
    </div>

    <!-- MURAL -->
    <div class="card">
      <div class="sec">O que acontece no seu corpo</div>
      <div class="mural-list" id="mural-list"></div>
    </div>

  </div>
</div>

<script>
// ── DADOS DO MURAL ─────────────────────────────────────
const EVENTS = [
  {h:0,  icon:'🍽️', title:'Jejum iniciado',          desc:'Insulina começa a cair. O corpo inicia a transição do estado alimentado para o estado de jejum.'},
  {h:2,  icon:'⬇️', title:'Insulina em queda',        desc:'Os níveis de insulina caem significativamente, sinalizando ao corpo para parar de armazenar gordura.'},
  {h:4,  icon:'🔄', title:'Glicogênio sendo usado',   desc:'O corpo começa a consumir o glicogênio (açúcar armazenado no fígado e músculos) como combustível.'},
  {h:6,  icon:'🧹', title:'Autofagia leve',            desc:'O processo de autofagia — limpeza celular — começa a se intensificar. Células danificadas são recicladas.'},
  {h:8,  icon:'🔥', title:'Queima de gordura inicia', desc:'Com o glicogênio quase esgotado, o corpo começa a oxidar ácidos graxos para gerar energia.'},
  {h:12, icon:'🌊', title:'Cetose leve',               desc:'O fígado começa a produzir corpos cetônicos. O cérebro passa a usar cetonas como combustível alternativo.'},
  {h:14, icon:'💡', title:'Clareza mental',            desc:'Muitas pessoas relatam aumento de foco e clareza mental com a produção crescente de cetonas.'},
  {h:16, icon:'🏆', title:'Marco 16:8',                desc:'Ponto ideal do jejum intermitente. Autofagia ativa, queima de gordura intensa e hormônio do crescimento elevado.'},
  {h:18, icon:'🦾', title:'GH em alta',                desc:'O hormônio do crescimento (GH) pode aumentar até 5x, protegendo massa muscular e acelerando a queima de gordura.'},
  {h:20, icon:'⚡', title:'Cetose profunda',           desc:'Produção intensa de cetonas. Energia estável, sem picos de insulina. Estado metabólico otimizado.'},
  {h:24, icon:'🔬', title:'Autofagia intensa',         desc:'24h de jejum ativa fortemente a autofagia. Proteínas mal dobradas e organelas danificadas são eliminadas.'},
  {h:36, icon:'🧠', title:'Neuroproteção',             desc:'Produção de BDNF (fator neurotrófico) aumenta. O jejum prolongado pode proteger e regenerar neurônios.'},
  {h:48, icon:'🌱', title:'Células-tronco ativas',    desc:'Jejuns de 48h+ podem estimular a regeneração de células-tronco do sistema imunológico e intestinal.'},
  {h:72, icon:'♻️', title:'Renovação imunológica',    desc:'Após 72h, estudos indicam renovação significativa do sistema imune. O corpo reinicia suas defesas celulares.'},
];

// ── ESTADO ─────────────────────────────────────────────
const ST = {running:false, startTime:null, goalHours:16, timerId:null};

function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem('jejum_v2'));
    if(s&&s.running&&s.startTime){
      ST.running=true; ST.startTime=s.startTime; ST.goalHours=s.goalHours||16;
      return true;
    }
  }catch(e){}
  return false;
}
function saveState(){
  localStorage.setItem('jejum_v2',JSON.stringify({running:ST.running,startTime:ST.startTime,goalHours:ST.goalHours}));
}

// ── DATA NO HEADER ─────────────────────────────────────
function updateDate(){
  document.getElementById('hdr-date').textContent=
    new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'}).toUpperCase();
}

// ── MURAL ──────────────────────────────────────────────
function buildMural(elapsedH){
  const list=document.getElementById('mural-list');
  if(!list) return;
  list.innerHTML='';

  let activeIdx=-1;
  EVENTS.forEach((ev,i)=>{ if(elapsedH>=ev.h) activeIdx=i; });

  EVENTS.forEach((ev,i)=>{
    const reached=elapsedH>=ev.h;
    const isActive=i===activeIdx;
    const isLast=i===EVENTS.length-1;

    const item=document.createElement('div');
    item.className='mural-item'+(reached?' reached':'')+(isActive?' active-now':'');
    item.innerHTML=`
      <div class="mural-left">
        <div class="mural-dot"></div>
        ${!isLast?'<div class="mural-line"></div>':''}
      </div>
      <div class="mural-body">
        <div class="mural-ts">${ev.h}h ${ev.icon}</div>
        <div class="mural-ev">${ev.title}</div>
        <div class="mural-desc">${ev.desc}</div>
      </div>`;
    list.appendChild(item);
  });
}

// ── CÍRCULO ────────────────────────────────────────────
const CIRC=2*Math.PI*100; // 628

function updateCircle(){
  if(!ST.running) return;
  const now=Date.now();
  const eMs=now-ST.startTime;
  const eSec=Math.floor(eMs/1000);
  const goalSec=ST.goalHours*3600;
  const pct=Math.min(eMs/(goalSec*1000),1);

  // Timer
  const h=Math.floor(eSec/3600),m=Math.floor((eSec%3600)/60),s=eSec%60;
  document.getElementById('c-time').textContent=
    String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');

  // Porcentagem e anel
  document.getElementById('c-pct').textContent=Math.floor(pct*100)+'%';
  const ring=document.getElementById('ring');
  ring.style.strokeDashoffset=CIRC*(1-pct);
  ring.classList.toggle('over',pct>=1);

  // Restante
  const rSec=Math.max(goalSec-eSec,0);
  const rh=Math.floor(rSec/3600),rm=Math.floor((rSec%3600)/60);
  document.getElementById('s-rest').textContent=String(rh).padStart(2,'0')+':'+String(rm).padStart(2,'0');

  // Meta e término
  document.getElementById('s-meta').textContent=ST.goalHours+'h';
  const end=new Date(ST.startTime+goalSec*1000);
  document.getElementById('s-term').textContent=String(end.getHours()).padStart(2,'0')+':'+String(end.getMinutes()).padStart(2,'0');

  // Atualiza mural com horas decorridas
  buildMural(eMs/3600000);
}

// ── MOSTRAR / ESCONDER ─────────────────────────────────
function showRunning(){
  document.getElementById('cfg').classList.add('hidden');
  document.getElementById('circle-sec').classList.remove('hidden');
}
function showConfig(){
  document.getElementById('cfg').classList.remove('hidden');
  document.getElementById('circle-sec').classList.add('hidden');
}

// ── INICIAR ────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click',()=>{
  const h=parseInt(document.getElementById('dur-input').value);
  if(isNaN(h)||h<1) return;
  ST.goalHours=h; ST.startTime=Date.now(); ST.running=true;
  saveState(); showRunning(); updateCircle();
  if(ST.timerId) clearInterval(ST.timerId);
  ST.timerId=setInterval(updateCircle,1000);
});

// ── ENCERRAR ───────────────────────────────────────────
document.getElementById('btn-stop').addEventListener('click',()=>{
  if(!confirm('Encerrar o jejum agora?')) return;
  clearInterval(ST.timerId);
  ST.running=false; ST.startTime=null;
  saveState(); showConfig(); buildMural(0);
});

// ── PRESETS ────────────────────────────────────────────
document.querySelectorAll('.pre-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.pre-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('dur-input').value=btn.dataset.h;
  });
});
document.getElementById('dur-input').addEventListener('input',()=>{
  const v=parseInt(document.getElementById('dur-input').value);
  document.querySelectorAll('.pre-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.h)===v));
});

// ── TELA CHEIA ─────────────────────────────────────────
const appEl=document.getElementById('main-app');
const goFull=()=>{
  if(!document.fullscreenElement) appEl.requestFullscreen().catch(()=>{});
  document.removeEventListener('click',goFull);
  document.removeEventListener('touchstart',goFull);
};
document.addEventListener('click',goFull);
document.addEventListener('touchstart',goFull);

// ── SERVICE WORKER ─────────────────────────────────────
if('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

// ── BANNER INSTALAR ────────────────────────────────────
let dPrm=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dPrm=e;document.getElementById('ib').classList.add('show');});
document.getElementById('ib-y').addEventListener('click',async()=>{document.getElementById('ib').classList.remove('show');if(dPrm){dPrm.prompt();await dPrm.userChoice;dPrm=null;}});
document.getElementById('ib-n').addEventListener('click',()=>document.getElementById('ib').classList.remove('show'));
window.addEventListener('appinstalled',()=>document.getElementById('ib').classList.remove('show'));

// ── SPLASH ─────────────────────────────────────────────
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    setTimeout(()=>{const s=document.getElementById('splash');if(s)s.remove();},800);
  },1800);
});

// ── INIT ───────────────────────────────────────────────
updateDate();
setInterval(updateDate,60000);

// Mural sempre visível desde o início
buildMural(0);

if(loadState()){
  showRunning();
  updateCircle();
  ST.timerId=setInterval(updateCircle,1000);
}
</script>
</body>
</html>
